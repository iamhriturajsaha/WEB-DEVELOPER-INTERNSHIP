<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer | InAmigos Foundation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient-background">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <nav class="navbar scrolled">
        <div class="logo">
            <span class="highlight">InAmigos</span> Foundation
        </div>
        <ul class="nav-links">
            <li><a href="home.html">Back to Home</a></li>
            <li><a href="donate.html" class="btn btn-secondary">Donate</a></li>
        </ul>
    </nav>

    <div class="subpage-hero" style="padding-top: 10rem; padding-bottom: 4rem; text-align: center;">
        <div class="section-container">
            <h1 class="hero-title text-gradient">Join the Movement</h1>
            <p class="hero-subtitle" style="margin: 0 auto;">Your time and skills can create a ripple effect of positive change. Become an InAmigos volunteer today.</p>
        </div>
    </div>

    <div class="section-container" style="padding-top: 0; max-width: 800px;">
        <div class="glass-panel" style="padding: 3rem;">
            <form onsubmit="event.preventDefault(); alert('Thank you for signing up! We will contact you soon.'); window.location.href='home.html';">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" id="firstName" class="form-control" required placeholder="Jane">
                    </div>
                    <div class="form-group">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" id="lastName" class="form-control" required placeholder="Doe">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="jane.doe@example.com">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" required placeholder="+91 00000 00000">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="interest" class="form-label">Area of Interest</label>
                    <select id="interest" class="form-control" required>
                        <option value="" disabled selected>Select a project to support...</option>
                        <option value="seva">Project SEVA (Hunger Relief)</option>
                        <option value="bachpanshala">PROJECT BACHPANSHALA (Education)</option>
                        <option value="udaan">Project UDAAN (Women's Empowerment)</option>
                        <option value="prakriti">Project PRAKRITI (Environment)</option>
                        <option value="jeev">Project JEEV (Animal Welfare)</option>
                        <option value="vikas">Project VIKAS (Youth)</option>
                        <option value="general">General Volunteering</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 2.5rem;">
                    <label for="message" class="form-label">Why do you want to join us?</label>
                    <textarea id="message" class="form-control" rows="4" placeholder="Tell us a little about yourself..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-glow" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Submit Application</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
